<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"/>
  <title>Mr Clearance — Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --red:#e31837; --red-dark:#c01230; --white:#fff; --bg:#f4f4f4; --border:#e0e0e0; --text:#1a1a1a; --text-mid:#555; --text-light:#999; }
    body { font-family:'Nunito Sans',sans-serif; background:var(--bg); color:var(--text); }
    
    /* Navbar */
    .navbar { display:flex; align-items:center; justify-content:space-between; padding:0 20px; height:64px; background:var(--red); position:sticky; top:0; z-index:1000; }
    .nav-logo { font-size:20px; font-weight:900; color:#fff; }
    .nav-logo span { color:#ffd0d8; }
    .nav-search { background:#fff; border:none; padding:8px 14px; border-radius:6px; font-size:14px; font-weight:600; width:180px; outline:none; }
    .cart-icon { display:flex; align-items:center; gap:6px; font-size:22px; cursor:pointer; color:#fff; background:rgba(255,255,255,0.15); padding:6px 12px; border-radius:6px; }
    .cart-count { background:#fff; color:var(--red); font-size:11px; font-weight:900; padding:1px 6px; border-radius:20px; }
    .hamburger { background:rgba(255,255,255,0.18); border:none; padding:8px 10px; border-radius:6px; cursor:pointer; }
    .hamburger span { display:block; width:20px; height:2px; background:#fff; margin:4px 0; }
    
    /* Hero */
    .hero { background:linear-gradient(135deg,#e31837,#8b0a1f); padding:60px 20px; text-align:center; color:#fff; }
    .hero-title { font-size:42px; font-weight:900; margin-bottom:10px; }
    .hero-accent { color:#ffd0d8; }
    .cta-btn { background:#fff; color:var(--red); border:none; padding:12px 32px; border-radius:30px; font-size:14px; font-weight:800; cursor:pointer; }
    
    /* Products */
    .products-section { padding:40px 20px; max-width:1200px; margin:0 auto; }
    .products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:14px; }
    .product-card { background:#fff; border-radius:12px; overflow:hidden; border:1px solid var(--border); cursor:pointer; transition:0.2s; }
    .product-card:hover { transform:translateY(-3px); box-shadow:0 6px 20px rgba(0,0,0,0.1); }
    .card-img-wrap { height:170px; background:#fafafa; cursor:pointer; }
    .card-img { width:100%; height:100%; object-fit:contain; padding:8px; }
    .badge-sale { position:absolute; top:8px; left:8px; background:var(--red); color:#fff; font-size:10px; font-weight:800; padding:3px 8px; border-radius:4px; }
    .card-body { padding:10px; }
    .product-card h3 { font-size:14px; font-weight:800; margin-bottom:4px; }
    .product-card p { font-size:11px; color:var(--text-light); margin-bottom:6px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .price { font-size:18px; font-weight:900; color:var(--red); margin-bottom:8px; display:block; }
    .add-btn { width:100%; padding:8px; background:var(--red); color:#fff; border:none; border-radius:8px; font-weight:800; cursor:pointer; }
    .product-sizes { font-size:10px; color:var(--text-light); margin-top:5px; }
    
    /* Modal */
    .product-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100000; align-items:center; justify-content:center; }
    .product-modal.open { display:flex; }
    .modal-content { background:#fff; width:95%; max-width:450px; max-height:85vh; border-radius:16px; overflow-y:auto; position:relative; }
    .modal-close { position:sticky; top:10px; right:10px; float:right; background:rgba(0,0,0,0.6); color:#fff; border:none; width:36px; height:36px; border-radius:50%; font-size:18px; cursor:pointer; z-index:10; margin:8px; }
    .modal-gallery { background:#f5f5f5; border-radius:16px 16px 0 0; }
    .modal-gallery-main { position:relative; height:260px; display:flex; align-items:center; justify-content:center; }
    .modal-gallery-main img { max-width:100%; max-height:100%; object-fit:contain; }
    .modal-gallery-prev, .modal-gallery-next { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.5); border:none; color:#fff; width:36px; height:36px; border-radius:50%; font-size:24px; cursor:pointer; }
    .modal-gallery-prev { left:10px; }
    .modal-gallery-next { right:10px; }
    .modal-thumbnails { display:flex; gap:8px; padding:12px; overflow-x:auto; background:#fff; }
    .modal-thumbnails img { width:55px; height:55px; object-fit:cover; border-radius:8px; border:2px solid transparent; cursor:pointer; }
    .modal-thumbnails img.active { border-color:#e31837; }
    .modal-info { padding:20px; }
    .modal-info h2 { font-size:20px; font-weight:800; }
    .modal-price { font-size:26px; font-weight:900; color:#e31837; margin:8px 0; }
    .modal-stock { font-size:12px; font-weight:700; padding:4px 10px; border-radius:20px; display:inline-block; margin-bottom:16px; }
    .modal-stock.in-stock { background:#e8f8f0; color:#27ae60; }
    .modal-stock.low-stock { background:#fff3e0; color:#e67e22; }
    .modal-stock.out-stock { background:#fde8ea; color:#e31837; }
    .modal-description p { font-size:14px; color:#555; margin-bottom:20px; }
    .modal-sizes h4, .modal-quantity h4 { font-size:13px; font-weight:800; color:#999; text-transform:uppercase; margin-bottom:8px; }
    .size-buttons { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
    .size-btn { padding:10px 18px; background:#f5f5f5; border:1px solid #e0e0e0; border-radius:30px; font-size:13px; font-weight:700; cursor:pointer; }
    .size-btn.active { background:#e31837; border-color:#e31837; color:#fff; }
    .qty-control { display:flex; align-items:center; gap:15px; margin-bottom:24px; }
    .qty-control button { width:40px; height:40px; background:#f5f5f5; border:1px solid #e0e0e0; border-radius:8px; font-size:20px; font-weight:800; cursor:pointer; }
    .qty-control span { font-size:18px; font-weight:800; min-width:40px; text-align:center; }
    .modal-add-btn { width:100%; padding:16px; background:#e31837; color:#fff; border:none; border-radius:12px; font-size:16px; font-weight:800; cursor:pointer; }
    
    /* Cart Sidebar */
    .cart-sidebar { position:fixed; top:0; right:-380px; width:340px; height:100%; background:#fff; z-index:9999; transition:right 0.3s; display:flex; flex-direction:column; }
    .cart-sidebar.open { right:0; }
    .cart-header { background:var(--red); color:#fff; padding:15px; display:flex; justify-content:space-between; }
    .cart-items { flex:1; overflow-y:auto; padding:15px; }
    .cart-item { display:flex; gap:10px; padding:10px 0; border-bottom:1px solid #eee; align-items:center; }
    .item-name { flex:1; font-size:13px; font-weight:700; }
    .item-size { font-size:10px; color:#999; }
    .cart-footer { padding:15px; border-top:1px solid #eee; }
    .checkout-btn { width:100%; padding:14px; background:var(--red); color:#fff; border:none; border-radius:10px; font-weight:800; cursor:pointer; }
    .cart-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9998; display:none; }
    .cart-overlay.open { display:block; }
    
    /* Footer */
    .footer { background:var(--text); color:#fff; text-align:center; padding:20px; font-size:12px; margin-top:40px; }
    
    @media (max-width:600px) { .products-grid { grid-template-columns:1fr 1fr; gap:10px; } .hero-title { font-size:32px; } .nav-search { width:120px; } }
  </style>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, collection, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    const firebaseConfig = {
      apiKey: "AIzaSyB9cnrgBoz4-3XSXDBUtLWURJ_ntisZwoM",
      authDomain: "mr-clearance.firebaseapp.com",
      projectId: "mr-clearance",
      storageBucket: "mr-clearance.firebasestorage.app",
      messagingSenderId: "427065460022",
      appId: "1:427065460022:web:77f93829d76cd9c2fd5f97"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    onSnapshot(collection(db, 'products'), (snap) => {
      var products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      localStorage.setItem('mrc_products', JSON.stringify(products));
      if (typeof renderProducts === 'function') renderProducts();
    });
  </script>
</head>
<body>

<div class="navbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <button class="hamburger" onclick="toggleCatMenu()"><span></span><span></span><span></span></button>
    <div class="nav-logo">Mr <span>Clearance</span></div>
  </div>
  <input type="text" class="nav-search" id="search-input" placeholder="🔍 Search..." oninput="filterProducts()">
  <div class="cart-icon" onclick="toggleCart()">🛒 <span class="cart-count" id="cart-count">0</span></div>
</div>

<div class="hero">
  <div><h1 class="hero-title">Shop Smart, <span class="hero-accent">Save Big</span></h1><button class="cta-btn" onclick="document.querySelector('.products-section').scrollIntoView({behavior:'smooth'})">Shop Now →</button></div>
</div>

<section class="products-section">
  <div class="products-grid" id="products-grid"></div>
  <p id="no-results" style="display:none;text-align:center;padding:40px;">No products found.</p>
</section>

<footer class="footer"><p>© 2026 Mr Clearance — All rights reserved</p></footer>

<div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
<div class="cart-sidebar" id="cart-sidebar">
  <div class="cart-header"><h3>Your Cart</h3><button onclick="toggleCart()">✕</button></div>
  <div class="cart-items" id="cart-items"><p style="text-align:center;padding:20px;">Cart is empty</p></div>
  <div class="cart-footer"><div style="margin-bottom:10px; display:flex; justify-content:space-between;"><span>Total</span><span id="cart-total">R0</span></div><button class="checkout-btn" onclick="checkout()">Checkout →</button></div>
</div>

<!-- Product Modal -->
<div id="product-modal" class="product-modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-gallery">
      <div class="modal-gallery-main"><button class="modal-gallery-prev" onclick="prevImage()">‹</button><img id="modal-img" src=""><button class="modal-gallery-next" onclick="nextImage()">›</button></div>
      <div class="modal-thumbnails" id="modal-thumbnails"></div>
    </div>
    <div class="modal-info">
      <h2 id="modal-name"></h2>
      <div class="modal-price" id="modal-price"></div>
      <div class="modal-stock" id="modal-stock"></div>
      <div class="modal-description"><p id="modal-desc"></p></div>
      <div class="modal-sizes"><h4>Select Size</h4><div class="size-buttons" id="size-buttons"></div></div>
      <div class="modal-quantity"><h4>Quantity</h4><div class="qty-control"><button onclick="changeQty(-1)">−</button><span id="modal-qty">1</span><button onclick="changeQty(1)">+</button></div></div>
      <button class="modal-add-btn" onclick="addToCartFromModal()">Add to Cart</button>
    </div>
  </div>
</div>

<script>
  // Default products
  var DEFAULT_PRODUCTS = [
    {id:1,name:"Air Max Sneakers",price:1299,category:"footwear",badge:"SALE",images:["https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300"],desc:"Comfortable running shoes",sizes:["S","M","L","XL"]},
    {id:2,name:"Wireless Headphones",price:2499,category:"electronics",badge:"HOT",images:["https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300"],desc:"Noise cancelling headphones",sizes:["One Size"]},
    {id:3,name:"Smart Watch",price:3799,category:"accessories",badge:"",images:["https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=300"],desc:"Track your fitness",sizes:["One Size"]},
    {id:4,name:"Urban Backpack",price:899,category:"accessories",badge:"",images:["https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=300"],desc:"Durable backpack",sizes:["One Size"]}
  ];

  function getProducts() { try { var s = localStorage.getItem('mrc_products'); if (s) return JSON.parse(s); } catch(e) {} return DEFAULT_PRODUCTS; }
  function getImages(p) { if (p.images && p.images.length) return p.images; if (p.image) return [p.image]; return ["https://via.placeholder.com/300?text=No+Image"]; }

  var cart = [];
  var currentProduct = null;
  var currentImages = [];
  var currentImgIndex = 0;
  var currentQty = 1;
  var currentSize = "";

  function renderProducts() {
    var products = getProducts();
    var grid = document.getElementById('products-grid');
    if (!products.length) { grid.innerHTML = '<p style="text-align:center;padding:40px;">No products</p>'; return; }
    grid.innerHTML = products.map(p => {
      var img = (getImages(p)[0]) || '';
      var sizesHtml = (p.sizes && p.sizes.length) ? '<div class="product-sizes">📏 ' + p.sizes.slice(0,3).join(', ') + (p.sizes.length>3 ? '+' : '') + '</div>' : '';
      return '<div class="product-card" data-id="'+p.id+'" data-name="'+escapeHtml(p.name)+'" data-price="'+p.price+'" data-category="'+p.category+'" data-desc="'+escapeHtml(p.desc||'')+'" data-imgs=\''+JSON.stringify(getImages(p))+'\' data-sizes=\''+JSON.stringify(p.sizes||[])+'\'><div class="card-img-wrap" onclick="openProductModal(\''+p.id+'\')"><img src="'+img+'" class="card-img" loading="lazy" onerror="this.src=\'https://via.placeholder.com/300\'">'+(p.badge?'<span class="badge-sale">'+p.badge+'</span>':'')+'</div><div class="card-body"><h3>'+escapeHtml(p.name)+'</h3><p>'+(p.desc||'').substring(0,60)+'</p><span class="price">R '+p.price.toLocaleString()+'</span>'+sizesHtml+'<button class="add-btn" onclick="event.stopPropagation();quickAdd(\''+p.id+'\')">Add to Cart</button></div></div>';
    }).join('');
  }

  function escapeHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function quickAdd(id) {
    var products = getProducts();
    var p = products.find(p => String(p.id) === String(id));
    if (!p) return;
    var size = (p.sizes && p.sizes.length) ? p.sizes[0] : "Standard";
    var existing = cart.find(i => i.name === p.name && i.size === size);
    if (existing) existing.qty += 1;
    else cart.push({ name: p.name, price: p.price, qty: 1, size: size, id: p.id });
    updateCartUI();
    showToast('✓ Added ' + p.name);
  }

  function openProductModal(id) {
    var products = getProducts();
    var p = products.find(p => String(p.id) === String(id));
    if (!p) return;
    currentProduct = p;
    currentImages = getImages(p);
    currentImgIndex = 0;
    currentQty = 1;
    currentSize = (p.sizes && p.sizes.length) ? p.sizes[0] : "Standard";
    
    document.getElementById('modal-name').textContent = p.name;
    document.getElementById('modal-price').textContent = 'R ' + p.price.toLocaleString();
    document.getElementById('modal-desc').textContent = p.desc || 'No description available.';
    document.getElementById('modal-img').src = currentImages[0] || '';
    document.getElementById('modal-qty').textContent = '1';
    
    var stock = p.stock || 0;
    var stockEl = document.getElementById('modal-stock');
    if (stock <= 0) { stockEl.textContent = '❌ Out of Stock'; stockEl.className = 'modal-stock out-stock'; }
    else if (stock <= 5) { stockEl.textContent = '⚠️ Only ' + stock + ' left'; stockEl.className = 'modal-stock low-stock'; }
    else { stockEl.textContent = '✓ In Stock (' + stock + ')'; stockEl.className = 'modal-stock in-stock'; }
    
    // Size buttons
    var sizeContainer = document.getElementById('size-buttons');
    if (p.sizes && p.sizes.length) {
      sizeContainer.innerHTML = p.sizes.map(s => '<button class="size-btn' + (s === currentSize ? ' active' : '') + '" onclick="selectSize(\'' + s + '\')">' + s + '</button>').join('');
    } else {
      sizeContainer.innerHTML = '<button class="size-btn active">Standard</button>';
    }
    
    // Thumbnails
    var thumbContainer = document.getElementById('modal-thumbnails');
    thumbContainer.innerHTML = currentImages.map((img, idx) => '<img src="' + img + '" onclick="goToImage(' + idx + ')" class="' + (idx === 0 ? 'active' : '') + '">').join('');
    
    document.getElementById('product-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() { document.getElementById('product-modal').classList.remove('open'); document.body.style.overflow = ''; }
  function prevImage() { currentImgIndex = (currentImgIndex - 1 + currentImages.length) % currentImages.length; document.getElementById('modal-img').src = currentImages[currentImgIndex]; updateThumbnails(); }
  function nextImage() { currentImgIndex = (currentImgIndex + 1) % currentImages.length; document.getElementById('modal-img').src = currentImages[currentImgIndex]; updateThumbnails(); }
  function goToImage(idx) { currentImgIndex = idx; document.getElementById('modal-img').src = currentImages[idx]; updateThumbnails(); }
  function updateThumbnails() { var thumbs = document.querySelectorAll('#modal-thumbnails img'); thumbs.forEach((t, i) => t.classList.toggle('active', i === currentImgIndex)); }
  function selectSize(size) { currentSize = size; document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('active')); event.target.classList.add('active'); }
  function changeQty(delta) { var newQty = currentQty + delta; if (newQty >= 1 && newQty <= 99) { currentQty = newQty; document.getElementById('modal-qty').textContent = currentQty; } }
  
  function addToCartFromModal() {
    if (!currentProduct) return;
    var existing = cart.find(i => i.name === currentProduct.name && i.size === currentSize);
    if (existing) existing.qty += currentQty;
    else cart.push({ name: currentProduct.name, price: currentProduct.price, qty: currentQty, size: currentSize, id: currentProduct.id });
    updateCartUI();
    showToast('✓ Added ' + currentQty + 'x ' + currentProduct.name + ' (' + currentSize + ')');
    closeModal();
  }

  function updateCartUI() {
    var total = 0, count = 0;
    cart.forEach(i => { total += i.price * i.qty; count += i.qty; });
    document.getElementById('cart-count').textContent = count;
    document.getElementById('cart-total').textContent = 'R ' + total.toLocaleString();
    var itemsDiv = document.getElementById('cart-items');
    if (!cart.length) { itemsDiv.innerHTML = '<p style="text-align:center;padding:20px;">Cart is empty</p>'; return; }
    itemsDiv.innerHTML = cart.map(i => '<div class="cart-item"><div><div class="item-name">' + i.name + '</div><div class="item-size">Size: ' + i.size + '</div></div><div><button onclick="changeCartQty(\'' + i.name + '\',\'' + i.size + '\',-1)">-</button> ' + i.qty + ' <button onclick="changeCartQty(\'' + i.name + '\',\'' + i.size + '\',1)">+</button></div><div>R ' + (i.price * i.qty).toLocaleString() + '</div><button onclick="removeFromCart(\'' + i.name + '\',\'' + i.size + '\')" style="background:none;border:none;">🗑</button></div>').join('');
  }

  function changeCartQty(name, size, delta) {
    var item = cart.find(i => i.name === name && i.size === size);
    if (item) { item.qty += delta; if (item.qty <= 0) cart = cart.filter(i => !(i.name === name && i.size === size)); }
    updateCartUI();
  }
  function removeFromCart(name, size) { cart = cart.filter(i => !(i.name === name && i.size === size)); updateCartUI(); }
  function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('open'); document.getElementById('cart-overlay').classList.toggle('open'); }
  function filterProducts() { var q = document.getElementById('search-input').value.toLowerCase(); var cards = document.querySelectorAll('#products-grid .product-card'); var visible = 0; cards.forEach(c => { var show = c.getAttribute('data-name').toLowerCase().includes(q); c.style.display = show ? '' : 'none'; if (show) visible++; }); document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none'; }
  function toggleCatMenu() { document.getElementById('cat-sidebar')?.classList.toggle('open'); document.getElementById('cat-overlay')?.classList.toggle('open'); }
  function checkout() { if (!cart.length) { showToast('Cart is empty'); return; } var total = cart.reduce((s,i) => s + i.price * i.qty, 0); showToast('Order total: R' + total.toLocaleString() + '. WhatsApp order coming soon!'); }
  function showToast(msg) { var t = document.getElementById('toast'); if (!t) { var div = document.createElement('div'); div.id = 'toast'; div.className = 'toast'; document.body.appendChild(div); } var toast = document.getElementById('toast'); toast.textContent = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2500); }

  renderProducts();
</script>

<!-- Category Sidebar (simple) -->
<div id="cat-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9997;" onclick="toggleCatMenu()"></div>
<div id="cat-sidebar" style="position:fixed;top:0;left:-280px;width:260px;height:100%;background:#fff;z-index:9998;transition:left 0.3s;">
  <div style="background:#e31837;padding:16px;color:#fff;"><h3>Categories</h3></div>
  <ul style="list-style:none;padding:10px 0;">
    <li onclick="selectCat('all')" style="padding:12px 20px;cursor:pointer;">🛍️ All Products</li>
    <li onclick="selectCat('footwear')" style="padding:12px 20px;cursor:pointer;">👟 Footwear</li>
    <li onclick="selectCat('electronics')" style="padding:12px 20px;cursor:pointer;">💻 Electronics</li>
    <li onclick="selectCat('accessories')" style="padding:12px 20px;cursor:pointer;">⌚ Accessories</li>
    <li onclick="selectCat('homeware')" style="padding:12px 20px;cursor:pointer;">🏠 Homeware</li>
    <li onclick="selectCat('clothing')" style="padding:12px 20px;cursor:pointer;">👕 Clothing</li>
  </ul>
</div>
<input type="hidden" id="category-filter" value="all">
<script>function selectCat(cat){ document.getElementById('category-filter').value=cat; filterProducts(); toggleCatMenu(); }</script>

<div id="toast" class="toast"></div>
</body>
</html>
